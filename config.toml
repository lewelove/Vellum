[storage]
library_root = "~/dev/mpf2k-test-library/albums"
metadata_store = "~/dev/mpf2k-test-library/metadata_output"

[generate]
supported_extensions = [".flac"]
grouping_keys = ["ALBUMARTIST", "ALBUM", "CUSTOM_ID"]
naming_separator = "_"
naming_sanitization_char = "_"

[generate.album]
layout = [
  "\n",
  "ALBUM",
  "ALBUMARTIST",
  "DATE",
  "GENRE",
  "\n",
  { "# -- Release Group / Issue --" = ["COMMENT", "MEDIA", "COUNTRY", "LABEL", "CATALOGNUMBER", "RELEASE_YYYY_MM", "\n"] },
  { "# -- Source --" = ["MAGNET", "SOURCE", "\n"] },
  { "# -- Digital Identifiers --" = ["DISCOGS_URL", "MUSICBRAINZ_URL", "ACCURIPID", "CTDBID", "DISCID", "\n"] },
  { "# -- MusicBraiz Metadata --" = ["MUSICBRAINZ_ALBUMID", "MUSICBRAINZ_ALBUMARTISTID", "MUSICBRAINZ_ARTISTID", "MUSICBRAINZ_RELEASEGROUPID", "\n"] },
  { "# -- Internal --" = ["*_path", "date_added", "\n"] },
  "# -- Other --" 
]

[generate.tracks]
layout = [
  "TRACKNUMBER",
  "TITLE",
  "ARTIST",
  "track_path",
  { "# -- MusicBraiz Metadata --" = ["MUSICBRAINZ_TRACKID", "MUSICBRAINZ_RELEASETRACKID", "\n"] },
]

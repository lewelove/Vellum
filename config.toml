[storage]
library_root = "/home/lewelove/dev/mpf2k-test-library/albums/"
library_export = "~/dev/mpf2k-test-library/metadata_output"

[generate]
supported_extensions = [".flac"]
grouping_keys = ["ALBUMARTIST", "ALBUM", "CUSTOM_ID"]
naming_separator = "_"
naming_sanitization_char = "_"

[compress.album]
layout = [
  "\n",
  "ALBUM",
  "ALBUMARTIST",
  "DATE",
  "GENRE",
  { "" = ["\n", "COMMENT"] },
  { "" = ["\n", "ORIGINAL_DATE", "ORIGINAL_YEAR", "ORIGINAL_YYYY_MM"] },
  { "" = ["\n", "COUNTRY", "LABEL", "CATALOGNUMBER", "RELEASE_DATE", "RELEASE_YEAR", "RELEASE_YYYY_MM"] },
  { "" = ["\n", "MEDIA", "DISCOGS_URL", "MUSICBRAINZ_URL"] },
  { "" = ["\n", "ACCURIPID", "CTDBID", "DISCID"] },
  { "" = ["\n", "DATEADDED"] },
  { "" = ["\n", "UNIX_ADDED_LOCAL", "UNIX_ADDED_APPLEMUSIC", "UNIX_ADDED_YOUTUBE", "UNIX_ADDED_PRIMARY", "UNIXTIMEFOOBAR", "UNIXTIMEAPPLE", "UNIXTIMEYOUTUBE"] },
  { "" = ["\n", "MAGNET", "SOURCE"] },
  "\n",
  "*",
  { "\n# -- MusicBraiz Metadata --" = ["MUSICBRAINZ_ALBUMID", "MUSICBRAINZ_ALBUMARTISTID", "MUSICBRAINZ_RELEASEGROUPID"] },
]

[compress.tracks]
layout = [
  "TRACKNUMBER",
  "TITLE",
  "ARTIST",
  { "" = ["MUSICBRAINZ_TRACKID", "MUSICBRAINZ_RELEASETRACKID", "MUSICBRAINZ_ARTISTID"] },
]

import = [
  "compiler_registry.toml",
  "lock_layout.toml"
]

[storage]
library_root = "/run/media/lewelove/1000xhome/backup-everything/FB2K/Library Historyfied!/"
library_export = "~/dev/vellum-test-library/metadata_output"
thumbnail_cache_folder = "~/.vellum/thumbnails"

[theme]
thumbnail_size = 190

[generate]
supported_extensions = [
  ".flac"
]
grouping_keys = [
  "ALBUMARTIST",
  "ALBUM",
  "CUSTOM_ID"
]
naming_separator = "_"
naming_sanitization_char = "_"

[extensions]
folder = "/home/lewelove/dev/vellum/extensions/python"
functions_folder = "functions"
flake = "flake.nix"
kernel_command = "python extensions/python/compile_kernel.py"

[manifest_layout]
album = { level = "album" }
albumartist = { level = "album" }
date = { level = "album" }
genre = { level = "album", add_newline = true }

comment = { level = "album", add_newline = true }

country = { level = "album" }
label = { level = "album" }
catalognumber = { level = "album" }
media = { level = "album", add_newline = true }

discogs_url = { level = "album" }
musicbrainz_url = { level = "album", add_newline = true }

title = { level = "track" }
artist = { level = "track" }
tracknumber = { level = "track" }
